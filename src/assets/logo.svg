<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer gem outline -->
  <polygon points="20,2 36,12 36,28 20,38 4,28 4,12" fill="none" stroke="#d4a820" strokeWidth="1.5" opacity="0.8"/>
  
  <!-- Middle gem shape -->
  <polygon points="20,8 32,16 32,24 20,32 8,24 8,16" fill="rgba(212,168,32,0.12)" stroke="#d4a820" strokeWidth="1"/>
  
  <!-- Inner gem highlight -->
  <polygon points="20,12 28,18 28,22 20,26 12,22 12,18" fill="rgba(212,168,32,0.25)" stroke="#d4a820" strokeWidth="0.8"/>
  
  <!-- Center sparkle -->
  <circle cx="20" cy="20" r="3" fill="#d4a820" opacity="0.6"/>
  
  <!-- Light rays for sparkle effect -->
  <line x1="20" y1="8" x2="20" y2="14" stroke="#d4a820" strokeWidth="0.8" opacity="0.4"/>
  <line x1="20" y1="26" x2="20" y2="32" stroke="#d4a820" strokeWidth="0.8" opacity="0.4"/>
  <line x1="8" y1="20" x2="14" y2="20" stroke="#d4a820" strokeWidth="0.8" opacity="0.4"/>
  <line x1="26" y1="20" x2="32" y2="20" stroke="#d4a820" strokeWidth="0.8" opacity="0.4"/>
</svg>
